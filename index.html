
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 45px 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none; }

    /* ===== Login & Sign Up Pages ===== */
    .auth-box h2 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #999;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 7px;
    }

    .input-group input {
      width: 100%;
      padding: 13px 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    .input-group input:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 5px;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.5);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #e74c3c;
      font-size: 13px;
      margin-bottom: 15px;
      min-height: 18px;
      padding: 0 2px;
    }

    .success-msg {
      color: #27ae60;
      font-size: 13px;
      margin-bottom: 15px;
      padding: 10px;
      background: #d5f4e6;
      border-radius: 5px;
    }

    .footer-text {
      text-align: center;
      margin-top: 25px;
      font-size: 13px;
      color: #aaa;
    }

    .footer-text a {
      color: #667eea;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    /* ===== Quiz Page ===== */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #eee;
    }

    .quiz-header h2 {
      font-size: 24px;
      color: #333;
    }

    .quiz-info {
      font-size: 14px;
      color: #666;
    }

    .logout-btn {
      padding: 8px 15px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

    .question-card {
      margin-bottom: 30px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
    }

    .question-num {
      font-size: 12px;
      color: #667eea;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      padding: 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      background: #f9f9f9;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option:hover {
      border-color: #667eea;
      background: #f0f4ff;
    }

    .option input[type="radio"] {
      cursor: pointer;
    }

    .option.selected {
      border-color: #667eea;
      background: #e6eef9;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #eee;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s ease;
    }

    .quiz-nav {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      justify-content: space-between;
    }

    .quiz-nav button {
      flex: 1;
      padding: 12px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .quiz-nav button:hover:not(:disabled) {
      background: #667eea;
      color: white;
    }

    .quiz-nav button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .submit-quiz-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #27ae60, #229954);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .submit-quiz-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(39, 174, 96, 0.5);
    }

    /* ===== Results Page ===== */
    .results-container {
      text-align: center;
    }

    .score-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0 auto 30px;
      color: white;
      font-size: 48px;
      font-weight: 700;
    }

    .score-text {
      font-size: 14px;
      color: #999;
    }

    .results-details {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: left;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .result-item:last-child {
      margin-bottom: 0;
    }

    .result-label {
      color: #666;
      font-weight: 600;
    }

    .result-value {
      color: #333;
      font-weight: 700;
    }

    .home-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .home-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.5);
    }

    .message-success {
      font-size: 18px;
      font-weight: 600;
      color: #27ae60;
      margin-bottom: 20px;
    }

    .message-good {
      font-size: 18px;
      font-weight: 600;
      color: #667eea;
      margin-bottom: 20px;
    }

    .divider {
      text-align: center;
      color: #ccc;
      font-size: 13px;
      margin: 20px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #eee;
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Page -->
    <div id="loginPage" class="auth-box">
      <h2>Welcome Back 👋</h2>
      <p class="subtitle">Please login to your account</p>

      <div id="loginError" class="error-msg"></div>

      <div class="input-group">
        <label>📧 Email Address</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" />
      </div>

      <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />
      </div>

      <button class="submit-btn" onclick="handleLogin()">Login →</button>

      <div class="divider">or</div>

      <p class="footer-text">Don't have an account? <a onclick="showSignup()">Sign up</a></p>
    </div>

    <!-- Sign Up Page -->
    <div id="signupPage" class="auth-box hidden">
      <h2>Create Account 🚀</h2>
      <p class="subtitle">Join us for the amazing quiz</p>

      <div id="signupError" class="error-msg"></div>
      <div id="signupSuccess" class="success-msg hidden"></div>

      <div class="input-group">
        <label>👤 Full Name</label>
        <input type="text" id="signupName" placeholder="Enter your full name" />
      </div>

      <div class="input-group">
        <label>📧 Email Address</label>
        <input type="email" id="signupEmail" placeholder="Enter your email" />
      </div>

      <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="signupPassword" placeholder="Enter your password (min 6 chars)" />
      </div>

      <div class="input-group">
        <label>🔒 Confirm Password</label>
        <input type="password" id="signupConfirm" placeholder="Confirm your password" />
      </div>

      <button class="submit-btn" onclick="handleSignup()">Sign Up →</button>

      <div class="divider">or</div>

      <p class="footer-text">Already have an account? <a onclick="showLogin()">Login</a></p>
    </div>

    <!-- Quiz Page -->
    <div id="quizPage" class="hidden">
      <div class="quiz-header">
        <div>
          <h2>🎯 Quiz Challenge</h2>
          <div class="quiz-info" id="userInfo"></div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div id="quizContent"></div>

      <div class="quiz-nav">
        <button id="prevBtn" onclick="prevQuestion()" disabled>← Previous</button>
        <button id="nextBtn" onclick="nextQuestion()">Next →</button>
      </div>

      <button class="submit-quiz-btn" id="submitBtn" onclick="submitQuiz()" style="display:none;">Submit Quiz 🎉</button>
    </div>

    <!-- Results Page -->
    <div id="resultsPage" class="hidden">
      <div class="results-container">
        <h2 style="margin-bottom: 20px;">🎊 Quiz Completed!</h2>
        <div id="resultMessage" class="message-success"></div>
        <div class="score-circle">
          <span id="finalScore">0</span>
          <span class="score-text">/ 100</span>
        </div>

        <div class="results-details">
          <div class="result-item">
            <span class="result-label">Total Questions:</span>
            <span class="result-value" id="totalQuestions">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">Correct Answers:</span>
            <span class="result-value" id="correctAnswers">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">Wrong Answers:</span>
            <span class="result-value" id="wrongAnswers">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">Accuracy:</span>
            <span class="result-value" id="accuracy">0%</span>
          </div>
        </div>

        <button class="home-btn" onclick="backToQuiz()">Play Again 🔄</button>
        <button class="logout-btn" style="width: 100%; margin-top: 10px;" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </div>

  <script>
    // Quiz Data
    const quizData = [
      {
        question: "What is the capital of France?",
        options: ["London", "Berlin", "Paris", "Madrid"],
        correct: 2
      },
      {
        question: "Which planet is closest to the Sun?",
        options: ["Venus", "Mercury", "Earth", "Mars"],
        correct: 1
      },
      {
        question: "What is the largest ocean on Earth?",
        options: ["Atlantic", "Indian", "Arctic", "Pacific"],
        correct: 3
      },
      {
        question: "Who wrote 'Romeo and Juliet'?",
        options: ["Charles Dickens", "William Shakespeare", "Jane Austen", "Mark Twain"],
        correct: 1
      },
      {
        question: "What is the chemical symbol for Gold?",
        options: ["Go", "Gd", "Au", "Ag"],
        correct: 2
      }
    ];

    // State Management
    let currentUser = null;
    let currentQuestion = 0;
    let userAnswers = [];
    let users = JSON.parse(localStorage.getItem('users')) || [];

    // Initialize
    function init() {
      const loggedInUser = localStorage.getItem('currentUser');
      if (loggedInUser) {
        currentUser = loggedInUser;
        showQuiz();
      } else {
        showLogin();
      }
    }

    // Page Navigation
    function showLogin() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('signupPage').classList.add('hidden');
      document.getElementById('quizPage').classList.add('hidden');
      document.getElementById('resultsPage').classList.add('hidden');
      clearErrors();
    }

    function showSignup() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('signupPage').classList.remove('hidden');
      document.getElementById('quizPage').classList.add('hidden');
      document.getElementById('resultsPage').classList.add('hidden');
      clearErrors();
    }

    function showQuiz() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('signupPage').classList.add('hidden');
      document.getElementById('quizPage').classList.remove('hidden');
      document.getElementById('resultsPage').classList.add('hidden');
      renderQuiz();
      document.getElementById('userInfo').textContent = `Welcome, ${currentUser}!`;
    }

    function showResults() {
      document.getElementById('quizPage').classList.add('hidden');
      document.getElementById('resultsPage').classList.remove('hidden');
      displayResults();
    }

    // Authentication
    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorMsg = document.getElementById('loginError');
      errorMsg.textContent = '';

      if (!email || !password) {
        errorMsg.textContent = '⚠️ Please fill in all fields.';
        return;
      }

      // Re-read users from localStorage to get latest data
      const currentUsers = JSON.parse(localStorage.getItem('users')) || [];
      
      const user = currentUsers.find(u => u.email === email && u.password === password);
      if (!user) {
        errorMsg.textContent = '⚠️ Invalid email or password.';
        return;
      }

      currentUser = user.name;
      users = currentUsers; // Update the users variable
      localStorage.setItem('currentUser', currentUser);
      currentQuestion = 0;
      userAnswers = new Array(quizData.length).fill(null);
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      showQuiz();
    }

    function handleSignup() {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      const confirm = document.getElementById('signupConfirm').value.trim();
      const errorMsg = document.getElementById('signupError');
      const successMsg = document.getElementById('signupSuccess');

      errorMsg.textContent = '';
      successMsg.classList.add('hidden');

      if (!name || !email || !password || !confirm) {
        errorMsg.textContent = '⚠️ Please fill in all fields.';
        return;
      }

      if (!email.includes('@')) {
        errorMsg.textContent = '⚠️ Please enter a valid email.';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = '⚠️ Password must be at least 6 characters.';
        return;
      }

      if (password !== confirm) {
        errorMsg.textContent = '⚠️ Passwords do not match.';
        return;
      }

      // Re-read users from localStorage to check for duplicates
      const currentUsers = JSON.parse(localStorage.getItem('users')) || [];
      
      if (currentUsers.some(u => u.email === email)) {
        errorMsg.textContent = '⚠️ Email already registered.';
        return;
      }

      currentUsers.push({ name, email, password });
      localStorage.setItem('users', JSON.stringify(currentUsers));
      users = currentUsers; // Update the users variable

      successMsg.textContent = '✅ Account created successfully! Redirecting to login...';
      successMsg.classList.remove('hidden');

      setTimeout(() => {
        document.getElementById('signupName').value = '';
        document.getElementById('signupEmail').value = '';
        document.getElementById('signupPassword').value = '';
        document.getElementById('signupConfirm').value = '';
        showLogin();
      }, 1500);
    }

    function handleLogout() {
      if (confirm('Are you sure you want to logout?')) {
        currentUser = null;
        localStorage.removeItem('currentUser');
        currentQuestion = 0;
        userAnswers = [];
        showLogin();
      }
    }

    // Quiz Functions
    function renderQuiz() {
      const quizContent = document.getElementById('quizContent');
      const question = quizData[currentQuestion];
      let html = `
        <div class="question-card">
          <div class="question-num">Question ${currentQuestion + 1} of ${quizData.length}</div>
          <div class="question-text">${question.question}</div>
          <div class="options">
      `;

      question.options.forEach((option, index) => {
        const isSelected = userAnswers[currentQuestion] === index;
        html += `
          <label class="option ${isSelected ? 'selected' : ''}">
            <input type="radio" name="answer" value="${index}" ${isSelected ? 'checked' : ''} onchange="selectAnswer(${index})">
            <span>${option}</span>
          </label>
        `;
      });

      html += '</div></div>';
      quizContent.innerHTML = html;

      // Update progress
      const progress = ((currentQuestion + 1) / quizData.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';

      // Update buttons
      document.getElementById('prevBtn').disabled = currentQuestion === 0;
      document.getElementById('nextBtn').style.display = currentQuestion === quizData.length - 1 ? 'none' : 'block';
      document.getElementById('submitBtn').style.display = currentQuestion === quizData.length - 1 ? 'block' : 'none';
    }

    function selectAnswer(index) {
      userAnswers[currentQuestion] = index;
    }

    function nextQuestion() {
      if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        renderQuiz();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuiz();
      }
    }

    function submitQuiz() {
      const correct = userAnswers.filter((ans, idx) => ans === quizData[idx].correct).length;
      const total = quizData.length;
      const score = Math.round((correct / total) * 100);

      localStorage.setItem('lastScore', JSON.stringify({
        correct,
        total,
        score,
        accuracy: ((correct / total) * 100).toFixed(1)
      }));

      showResults();
    }

    function displayResults() {
      const result = JSON.parse(localStorage.getItem('lastScore'));
      document.getElementById('finalScore').textContent = result.score;
      document.getElementById('totalQuestions').textContent = result.total;
      document.getElementById('correctAnswers').textContent = result.correct;
      document.getElementById('wrongAnswers').textContent = result.total - result.correct;
      document.getElementById('accuracy').textContent = result.accuracy + '%';

      let message = '';
      if (result.score >= 80) {
        message = '🌟 Outstanding! You did amazing!';
      } else if (result.score >= 60) {
        message = '👍 Great job! Keep it up!';
      } else {
        message = '💪 Good attempt! Practice more to improve!';
      }
      document.getElementById('resultMessage').textContent = message;
    }

    function backToQuiz() {
      currentQuestion = 0;
      userAnswers = new Array(quizData.length).fill(null);
      showQuiz();
    }

    function clearErrors() {
      document.getElementById('loginError').textContent = '';
      document.getElementById('signupError').textContent = '';
      document.getElementById('signupSuccess').classList.add('hidden');
    }

    // Start app
    init();
  </script>
</body>
</html>
